<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solana Top Token Holders & Whales</title>
  <link rel="stylesheet" href="app.css?v=2" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Top Token Holders & Whales</h1>
      <p class="subtitle">Solana top holders and whale wallet tracking via Vybe API</p>
    </header>

    <section class="inputs">
      <div class="field">
        <label for="mint" id="searchInputLabel">Token mint address</label>
        <input type="text" id="mint" placeholder="e.g. DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263" value="DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263" />
      </div>
      <div class="actions">
        <button type="button" id="fetchAll">Load token analytics</button>
        <div class="loading" id="loadingIndicator" hidden aria-hidden="true">
          <span class="loading-spinner"></span>
          <span class="loading-text">Loading…</span>
        </div>
      </div>
    </section>

    <section class="token-section panel" id="tokenSection">
      <div class="section-header">
        <h2>Token stats & metadata</h2>
        <div class="section-loading" id="tokenSectionLoading" hidden aria-hidden="true">
          <span class="loading-spinner"></span>
          <span class="loading-text">Loading…</span>
        </div>
        <span class="section-error" id="tokenSectionError" hidden aria-hidden="true"></span>
      </div>
      <div class="token-section-content" id="tokenSectionContent">
        <div class="token-header">
          <img id="tokenLogo" alt="" class="token-logo" style="display:none" />
          <div>
            <span id="tokenSymbol" class="symbol">—</span>
            <span id="tokenName" class="name">—</span>
          </div>
        </div>
        <div class="token-stats-groups" id="tokenStats"></div>
      </div>
    </section>

    <section class="holders-section panel" id="holdersSection">
      <div class="section-header">
        <h2>Top 100 holders (by % supply)</h2>
        <div class="section-loading" id="holdersLoading" hidden aria-hidden="true">
          <span class="loading-spinner"></span>
          <span class="loading-text">Loading…</span>
        </div>
        <span class="section-error" id="holdersError" hidden aria-hidden="true"></span>
      </div>
      <div class="holders-content" id="holdersContentWrap">
        <p class="meta" id="holdersMeta"></p>
        <div class="table-wrap">
          <table id="holdersTable">
            <thead>
              <tr>
                <th style="text-align: left">Rank</th>
                <th style="text-align: left">Owner</th>
                <th style="text-align: left">Balance</th>
                <th style="text-align: right">Value (USD)</th>
                <th style="text-align: right">% supply</th>
              </tr>
            </thead>
            <tbody id="holdersBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="error panel" id="errorSection" hidden>
      <h2>Error</h2>
      <pre id="errorText"></pre>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
